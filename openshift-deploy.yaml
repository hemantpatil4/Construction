      securityContext: {}
      containers:
        - name: frontend
          image: "quay.io/vinayakv2m/finiq/frontend:latest"
          ports:
            - name: 8080-tcp
              containerPort: 8080
              protocol: TCP
          resources:
            limits:
              cpu: 200m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      dnsPolicy: ClusterFirst
      tolerations:
        - key: dedicated
          operator: Equal
          value: hdfc
          effect: NoSchedule
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: hdfc
                    operator: In
                    values:
                      - "true"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: grafana-test
spec:
  selector:
