    - name: 8080-tcp
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
---
# ==================== ROUTE (External Access) ====================
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend-route
  namespace: grafana-test
spec:
  to:
    kind: Service
    name: frontend-service
    weight: 100
  port:
    targetPort: 8080-tcp
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
